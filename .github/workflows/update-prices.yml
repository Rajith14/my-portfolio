name: Update portfolio prices

on:
  schedule:
    # 03:30 UTC on the 1st of every month  ==  09:00 IST
    - cron: "30 3 1 * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab anytime

permissions:
  contents: write          # allow the job to commit prices.json back to the repo

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch latest prices
        run: python automation/update_prices.py

      - name: Commit updated prices
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git commit -m "Auto-update prices ($(date -u +'%d %b %Y'))" || echo "No price changes"
          git push
